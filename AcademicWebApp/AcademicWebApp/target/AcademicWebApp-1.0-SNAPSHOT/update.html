<!DOCTYPE html>
<html>
<head>
    <title>Update Student</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    
    <div class="card shadow p-4 mx-auto" style="max-width: 400px;">
        
        <h3 class="text-center mb-4">Update Student</h3>

        <form action="UpdateStudentServlet" method="post">
            
            <input type="number" name="enrollment" class="form-control mb-3" placeholder="Enter Enrollment">
            
            <input type="text" name="name" class="form-control mb-3" placeholder="Enter New Name">
            
            <button class="btn btn-warning w-100">Update Student</button>
        </form>

        <a href="index.html" class="btn btn-secondary mt-3">Back to Home</a>

    </div>

</div>

</body>
</html>
