<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    
    <div class="card shadow p-4 mx-auto" style="max-width: 400px;">
        
        <h3 class="text-center mb-4">Add Student</h3>

        <form action="InsertStudentServlet" method="post">
            
            <input type="text" name="name" class="form-control mb-3" placeholder="Enter Name">
            
            <input type="text" name="email" class="form-control mb-3" placeholder="Enter Email">
            
            <input type="text" name="department" class="form-control mb-3" placeholder="Enter Department">
            
            <input type="text" name="enrollment" class="form-control mb-3" placeholder="Enter enrollment">
            
            <input type="number" name="semester" class="form-control mb-3" placeholder="Enter Semester">
            
            <button class="btn btn-primary w-100">Add Student</button>
        </form>

        <a href="index.html" class="btn btn-secondary mt-3">Back to Home</a>

    </div>

</div>

</body>
</html>
