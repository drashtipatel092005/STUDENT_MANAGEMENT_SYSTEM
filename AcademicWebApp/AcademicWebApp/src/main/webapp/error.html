<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Error Popup</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        /* Overlay background */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            justify-content: center;
            align-items: center;
        }

        /* Popup box */
        .popup {
            background: #fff;
            padding: 20px 30px;
            border-radius: 10px;
            text-align: center;
            width: 300px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            animation: pop 0.3s ease;
        }

        /* Animation */
        @keyframes pop {
            from {
                transform: scale(0.5);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Button */
        button {
            padding: 10px 15px;
            margin-top: 15px;
            border: none;
            background: red;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: darkred;
        }
    </style>
</head>
<body onload="showPopup()">


    <!-- Popup -->
    <div class="overlay" id="overlay">
        <div class="popup">
            <h3>Error!</h3>
            <p>Something went wrong.</p>
            <a href="index.html"><button onclick="closePopup()">Back to Home</button></a>
        </div>
    </div>

    <script>
        function showPopup() {
            document.getElementById("overlay").style.display = "flex";
        }

        function closePopup() {
            document.getElementById("overlay").style.display = "none";
        }
    </script>

</body>
</html>
